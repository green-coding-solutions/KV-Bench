# YCSB properties for Redis (KV-Bench).
#
# Only the connection block is store-specific. The sizing knobs below are the
# fairness knobs: they are byte-identical across every store's properties file
# (check_repo.py enforces this) so every engine does the same work. The
# operation mix and request distribution are NOT set here — they come from the
# per-workload file (workloads/workloada..f) so each of the six YCSB core
# workloads keeps its canonical semantics.

# --- Connection (Redis binding; also used by Valkey/KeyDB/Dragonfly) ---
redis.host=redis_container
redis.port=6379

# --- Fairness knobs (identical across all stores) ---
# 1,000,000 records x 10 fields x 100 bytes ~= 1 GB working set, larger than a
# stock cache so memory sizing (T1) shows.
recordcount=1000000
operationcount=1000000
fieldcount=10
fieldlength=100
threadcount=8
