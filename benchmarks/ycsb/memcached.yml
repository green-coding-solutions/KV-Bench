---
name: YCSB Memcached benchmark
author: Didi Hoffmann <didi@green-coding.io)
description: Benchmarks Memcached as a key-value store with YCSB (core workloads A,B,C,F,D)

# GENERATED by gen_scenarios.py — do not edit by hand; edit the generator and rerun.

compose-file: !include compose.yml

custom_metrics:
  ycsb_ops: # functional unit: YCSB operations completed across the measured run phases
    unit: YCSB operation
    sci: true

services:
  redis: # unused — empty key removes the service
  valkey: # unused — empty key removes the service
  keydb: # unused — empty key removes the service
  dragonfly: # unused — empty key removes the service
  postgres: # unused — empty key removes the service
  memtier: # unused — empty key removes the service
  ycsb: # load driver; wait for the store to be healthy first
    depends_on:
      memcached:
        condition: service_healthy

flow:
  - name: Load dataset
    container: ycsb_container
    commands:
      - type: console
        note: YCSB LOAD
        command: ./bin/ycsb load memcached -P workloads/workloada -P /tmp/repo/db/memcached/ycsb/memcached_ycsb.properties 2>&1 | tee /dev/stderr | grep -q '\[OVERALL\]'
        shell: sh
        log-stdout: true
  - name: Run workload A (read-update 50-50)
    container: ycsb_container
    commands:
      - type: console
        note: YCSB RUN A
        command: ./bin/ycsb run memcached -P workloads/workloada -P /tmp/repo/db/memcached/ycsb/memcached_ycsb.properties 2>&1 | tee /dev/stderr | awk '/\[OVERALL\], RunTime\(ms\)/{rt=$NF} /\[OVERALL\], Throughput\(ops\/sec\)/{tp=$NF} END{if(tp!=""){ops=int(rt/1000*tp+0.5);"date +%s"|getline ts;printf("%s000000 ycsb_ops=%s\n",ts,ops)}}'
        shell: sh
        log-stdout: true
        read-sci-stdout: true
  - name: Run workload B (read-heavy 95-5)
    container: ycsb_container
    commands:
      - type: console
        note: YCSB RUN B
        command: ./bin/ycsb run memcached -P workloads/workloadb -P /tmp/repo/db/memcached/ycsb/memcached_ycsb.properties 2>&1 | tee /dev/stderr | awk '/\[OVERALL\], RunTime\(ms\)/{rt=$NF} /\[OVERALL\], Throughput\(ops\/sec\)/{tp=$NF} END{if(tp!=""){ops=int(rt/1000*tp+0.5);"date +%s"|getline ts;printf("%s000000 ycsb_ops=%s\n",ts,ops)}}'
        shell: sh
        log-stdout: true
        read-sci-stdout: true
  - name: Run workload C (read-only)
    container: ycsb_container
    commands:
      - type: console
        note: YCSB RUN C
        command: ./bin/ycsb run memcached -P workloads/workloadc -P /tmp/repo/db/memcached/ycsb/memcached_ycsb.properties 2>&1 | tee /dev/stderr | awk '/\[OVERALL\], RunTime\(ms\)/{rt=$NF} /\[OVERALL\], Throughput\(ops\/sec\)/{tp=$NF} END{if(tp!=""){ops=int(rt/1000*tp+0.5);"date +%s"|getline ts;printf("%s000000 ycsb_ops=%s\n",ts,ops)}}'
        shell: sh
        log-stdout: true
        read-sci-stdout: true
  - name: Run workload F (read-modify-write)
    container: ycsb_container
    commands:
      - type: console
        note: YCSB RUN F
        command: ./bin/ycsb run memcached -P workloads/workloadf -P /tmp/repo/db/memcached/ycsb/memcached_ycsb.properties 2>&1 | tee /dev/stderr | awk '/\[OVERALL\], RunTime\(ms\)/{rt=$NF} /\[OVERALL\], Throughput\(ops\/sec\)/{tp=$NF} END{if(tp!=""){ops=int(rt/1000*tp+0.5);"date +%s"|getline ts;printf("%s000000 ycsb_ops=%s\n",ts,ops)}}'
        shell: sh
        log-stdout: true
        read-sci-stdout: true
  - name: Run workload D (read-latest)
    container: ycsb_container
    commands:
      - type: console
        note: YCSB RUN D
        command: ./bin/ycsb run memcached -P workloads/workloadd -P /tmp/repo/db/memcached/ycsb/memcached_ycsb.properties 2>&1 | tee /dev/stderr | awk '/\[OVERALL\], RunTime\(ms\)/{rt=$NF} /\[OVERALL\], Throughput\(ops\/sec\)/{tp=$NF} END{if(tp!=""){ops=int(rt/1000*tp+0.5);"date +%s"|getline ts;printf("%s000000 ycsb_ops=%s\n",ts,ops)}}'
        shell: sh
        log-stdout: true
        read-sci-stdout: true
