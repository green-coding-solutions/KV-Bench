---
name: YCSB Dragonfly benchmark (T1 envelope-sized)
author: Didi Hoffmann <didi@green-coding.io)
description: >
  YCSB on Dragonfly as a key-value store, tuning tier T1
  (envelope-sized engine config for the 4-CPU / 8-GB container; durability
  left at default so the T0->T1 delta is pure resource sizing). See TUNING.md.

# GENERATED by gen_scenarios.py — do not edit by hand; edit the generator and rerun.

compose-file: !include compose.yml

custom_metrics:
  ycsb_ops: # functional unit: YCSB operations completed across the measured run phases
    unit: YCSB operation
    sci: true

services:
  dragonfly:
    command:
      - "--maxmemory=6gb"
      - "--proactor_threads=4"
      - "--cache_mode=true"
  redis: # unused — empty key removes the service
  valkey: # unused — empty key removes the service
  keydb: # unused — empty key removes the service
  memcached: # unused — empty key removes the service
  postgres: # unused — empty key removes the service
  memtier: # unused — empty key removes the service
  ycsb: # load driver; wait for the store to be healthy first
    depends_on:
      dragonfly:
        condition: service_healthy

# Same benchmark flow as the default (T0) scenario (dragonfly.yml).
flow: !include ['dragonfly.yml', 'flow']
