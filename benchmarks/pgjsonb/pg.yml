---
name: PostgreSQL JSONB query benchmark
author: Didi Hoffmann <didi@green-coding.io)
description: Indexes a key inside a JSONB document and benchmarks indexed equality lookups with pgbench

# GENERATED by gen_scenarios.py — do not edit by hand; edit the generator and rerun.

compose-file: !include compose.yml

custom_metrics:
  jsonb_queries: # functional unit: indexed JSONB lookups completed in the measured run
    unit: JSONB query
    sci: true

services:
  redis: # unused — empty key removes the service
  valkey: # unused — empty key removes the service
  keydb: # unused — empty key removes the service
  dragonfly: # unused — empty key removes the service
  memcached: # unused — empty key removes the service
  ycsb: # unused — empty key removes the service
  memtier: # unused — empty key removes the service

flow:
  - name: Create schema and load JSONB documents
    container: postgres_container
    commands:
      - type: console
        note: LOAD JSONB DOCS
        command: . /tmp/repo/db/pg/pgjsonb/pg_pgjsonb.env && until pg_isready -h localhost -U postgres >/dev/null 2>&1; do sleep 1; done; psql "postgresql://postgres:postgres@localhost:5432/postgres" -tc "SELECT 1 FROM pg_database WHERE datname='jsonbbench'" | grep -q 1 || psql "postgresql://postgres:postgres@localhost:5432/postgres" -c "CREATE DATABASE jsonbbench"; psql "postgresql://postgres:postgres@localhost:5432/jsonbbench" -v ON_ERROR_STOP=1 -c "CREATE TABLE IF NOT EXISTS docs (id bigint PRIMARY KEY, doc jsonb NOT NULL);" -c "TRUNCATE docs;" -c "INSERT INTO docs SELECT g, jsonb_build_object('field0','key'||g,'category',(g%1000),'payload',md5(random()::text)) FROM generate_series(0, $((PGJSONB_ROWS-1))) g;"
        shell: sh
        log-stdout: true
  - name: Create index on inner JSONB key
    container: postgres_container
    commands:
      - type: console
        note: CREATE JSONB INDEX
        command: psql "postgresql://postgres:postgres@localhost:5432/jsonbbench" -v ON_ERROR_STOP=1 -c "CREATE INDEX IF NOT EXISTS docs_field0_idx ON docs ((doc ->> 'field0'));" -c "ANALYZE docs;"
        shell: sh
        log-stdout: true
  - name: Run indexed JSONB query benchmark
    container: postgres_container
    commands:
      - type: console
        note: PGBENCH JSONB QUERY
        command: . /tmp/repo/db/pg/pgjsonb/pg_pgjsonb.env && pgbench -n -c $PGJSONB_CLIENTS -j $PGJSONB_JOBS -T $PGJSONB_DURATION -D maxid=$((PGJSONB_ROWS-1)) -f /tmp/repo/db/pg/pgjsonb/query.sql "postgresql://postgres:postgres@localhost:5432/jsonbbench" 2>&1 | tee /dev/stderr | awk '/transactions actually processed/{n=$NF} END{if(n!=""){"date +%s"|getline ts;printf("%s000000 jsonb_queries=%s\n",ts,n)}}'
        shell: sh
        log-stdout: true
        read-sci-stdout: true
