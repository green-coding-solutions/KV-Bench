---
name: PostgreSQL JSONB query benchmark (T1 envelope-sized)
author: Didi Hoffmann <didi@green-coding.io)
description: >
  PostgreSQL JSONB query on PostgreSQL, tuning tier T1 (envelope-sized engine
  config for the 4-CPU / 8-GB container). See TUNING.md.

# GENERATED by gen_scenarios.py — do not edit by hand; edit the generator and rerun.

compose-file: !include compose.yml

custom_metrics:
  jsonb_queries: # functional unit: indexed JSONB lookups completed in the measured run
    unit: JSONB query
    sci: true

services:
  postgres:
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=2GB"
      - "-c"
      - "effective_cache_size=6GB"
      - "-c"
      - "maintenance_work_mem=512MB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "min_wal_size=1GB"
      - "-c"
      - "max_wal_size=4GB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "max_worker_processes=4"
      - "-c"
      - "max_parallel_workers=4"
  redis: # unused — empty key removes the service
  valkey: # unused — empty key removes the service
  keydb: # unused — empty key removes the service
  dragonfly: # unused — empty key removes the service
  memcached: # unused — empty key removes the service
  ycsb: # unused — empty key removes the service
  memtier: # unused — empty key removes the service

# Same benchmark flow as the default (T0) scenario (pg.yml).
flow: !include ['pg.yml', 'flow']
