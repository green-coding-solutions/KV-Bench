---
name: memtier Valkey benchmark
author: Didi Hoffmann <didi@green-coding.io)
description: Benchmarks Valkey with memtier_benchmark (GET/SET throughput + latency)

# GENERATED by gen_scenarios.py — do not edit by hand; edit the generator and rerun.

compose-file: !include compose.yml

custom_metrics:
  memtier_ops: # functional unit: memtier operations completed in the measured run
    unit: memtier operation
    sci: true

services:
  redis: # unused — empty key removes the service
  keydb: # unused — empty key removes the service
  dragonfly: # unused — empty key removes the service
  memcached: # unused — empty key removes the service
  postgres: # unused — empty key removes the service
  ycsb: # unused — empty key removes the service
  memtier: # load driver; wait for the store to be healthy first
    depends_on:
      valkey:
        condition: service_healthy

flow:
  - name: Warm up (populate all keys)
    container: memtier_container
    commands:
      - type: console
        note: MEMTIER WARMUP
        command: . /tmp/repo/db/valkey/memtier/valkey_memtier.env && memtier_benchmark --host=$MEMTIER_HOST --port=$MEMTIER_PORT --protocol=$MEMTIER_PROTOCOL -c $MEMTIER_CLIENTS -t $MEMTIER_THREADS --data-size=$MEMTIER_DATA_SIZE --key-maximum=$MEMTIER_KEY_MAX --ratio=1:0 --key-pattern=P:P --key-minimum=1 --requests=allkeys --hide-histogram
        shell: sh
        log-stdout: true
  - name: Run mixed GET-SET workload
    container: memtier_container
    commands:
      - type: console
        note: MEMTIER RUN
        command: . /tmp/repo/db/valkey/memtier/valkey_memtier.env && memtier_benchmark --host=$MEMTIER_HOST --port=$MEMTIER_PORT --protocol=$MEMTIER_PROTOCOL -c $MEMTIER_CLIENTS -t $MEMTIER_THREADS --data-size=$MEMTIER_DATA_SIZE --key-maximum=$MEMTIER_KEY_MAX --ratio=$MEMTIER_RATIO --key-pattern=R:R --test-time=$MEMTIER_TEST_TIME --hide-histogram 2>&1 | tee /dev/stderr | awk '/^Totals/{o=$2} END{if(o!=""){ops=int(o*'"$MEMTIER_TEST_TIME"'+0.5);"date +%s"|getline ts;printf("%s000000 memtier_ops=%s\n",ts,ops)}}'
        shell: sh
        log-stdout: true
        read-sci-stdout: true
